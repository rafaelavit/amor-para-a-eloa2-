<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💖 Nosso Amor 💖</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
}

/* HEADER */

header{
padding:40px 20px;
color:white;
}

header h1{
font-size:40px;
}

/* CAROUSEL */

.carousel{
width:100%;
overflow:hidden;
position:relative;
margin:40px 0;
}

.carousel-track{
display:flex;
transition:.5s;
}

.slide{
min-width:100%;
padding:60px 20px;
font-size:22px;
color:white;
}

.slide:nth-child(1){background:#ff6f91;}
.slide:nth-child(2){background:#ff9671;}
.slide:nth-child(3){background:#ffc75f;}
.slide:nth-child(4){background:#f9f871;}

.carousel-buttons{
position:absolute;
top:50%;
width:100%;
display:flex;
justify-content:space-between;
transform:translateY(-50%);
}

.carousel-buttons button{
border:none;
padding:10px 15px;
font-size:20px;
cursor:pointer;
border-radius:10px;
background:white;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
max-width:1000px;
margin:auto;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
color:#ff4d6d;
margin-bottom:10px;
}

/* JOGO */

#game{
position:relative;
width:95%;
max-width:900px;
height:420px;
margin:40px auto;
background:linear-gradient(#ff9a9e,#fad0c4);
overflow:hidden;
border-radius:10px;
}

.world{
position:absolute;
width:12000px;
height:100%;
}

.player{
position:absolute;
width:40px;
height:40px;
background:#ff4d6d;
border-radius:50%;
bottom:40px;
}

.platform{
position:absolute;
width:150px;
height:15px;
background:#a66b3d;
}

.ground{
position:absolute;
bottom:0;
width:12000px;
height:40px;
background:#8b5e3c;
}

.heart{
position:absolute;
font-size:24px;
}

.spike{
position:absolute;
width:40px;
height:40px;
bottom:40px;
background:red;
clip-path:polygon(50% 0%,0% 100%,100% 100%);
}

.enemy{
position:absolute;
width:35px;
height:35px;
background:#222;
border-radius:50%;
bottom:40px;
}

.tower{
position:absolute;
width:100px;
height:250px;
background:#8b5e3c;
bottom:0;
}

.princess{
position:absolute;
width:40px;
height:40px;
background:#ff99cc;
border-radius:50%;
}

.message{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
color:white;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:32px;
}

#score{
font-size:20px;
margin-bottom:10px;
}

/* CONTROLES */

.controls{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:15px;
z-index:1000;
}

.controls button{
width:70px;
height:70px;
font-size:30px;
border:none;
border-radius:15px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

/* MOBILE */

@media (max-width:600px){

.controls button{
width:65px;
height:65px;
font-size:28px;
}

header h1{
font-size:28px;
}

.slide{
font-size:18px;
padding:40px 15px;
}

}

</style>
</head>

<body>

<header>
<h1>💖 Nosso Mundo de Amor 💖</h1>
<p>Uma jornada para salvar quem você ama</p>
</header>

<section class="carousel">

<div class="carousel-track" id="carouselTrack">
<div class="slide">💖 O amor é a maior aventura</div>
<div class="slide">🌹 Cada momento vale ouro</div>
<div class="slide">💌 Amor é cuidar</div>
<div class="slide">❤️ Nosso amor é infinito</div>
</div>

<div class="carousel-buttons">
<button onclick="prevSlide()">◀</button>
<button onclick="nextSlide()">▶</button>
</div>

</section>

<h2>💖 Para o meu amor 💖</h2>
<div id="score">Corações: 0 / 100</div>

<div id="game">

<div class="world" id="world">

<div class="ground"></div>
<div class="player" id="player"></div>

<div class="platform" style="left:400px;bottom:120px"></div>
<div class="platform" style="left:900px;bottom:200px"></div>

<div class="spike" style="left:700px"></div>

<div class="enemy" style="left:1200px"></div>

<div class="tower" style="left:11000px"></div>
<div class="princess" style="left:11020px;bottom:260px"></div>

<div id="hearts"></div>

</div>

<div class="message" id="message"></div>

</div>

<div class="controls">
<button id="left">⬅</button>
<button id="jump">⬆</button>
<button id="right">➡</button>
</div>

<script>

/* CAROUSEL */

let index=0
const track=document.getElementById("carouselTrack")

function updateCarousel(){
track.style.transform="translateX(-"+index*100+"%)"
}

function nextSlide(){
index++
if(index>3) index=0
updateCarousel()
}

function prevSlide(){
index--
if(index<0) index=3
updateCarousel()
}

setInterval(nextSlide,4000)

/* JOGO */

const player=document.getElementById("player")
const world=document.getElementById("world")
const platforms=document.querySelectorAll(".platform")
const spikes=document.querySelectorAll(".spike")
const enemies=document.querySelectorAll(".enemy")
const princess=document.querySelector(".princess")
const heartsContainer=document.getElementById("hearts")
const message=document.getElementById("message")
const scoreText=document.getElementById("score")

let x=50
let y=40
let velocityY=0
let gravity=0.5
let jumping=false
let score=0

const keys={}

/* gerar corações */

for(let i=0;i<100;i++){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*10800+"px"
heart.style.bottom=(60+Math.random()*300)+"px"

heartsContainer.appendChild(heart)

}

function die(){

message.style.display="flex"
message.innerHTML="💀 Você morreu<br>Reiniciando..."

setTimeout(()=>{
location.reload()
},2000)

}

/* teclado */

document.addEventListener("keydown",e=>{
keys[e.key]=true

if(e.key===" " && !jumping){
velocityY=12
jumping=true
}

})

document.addEventListener("keyup",e=>{
keys[e.key]=false
})

/* CONTROLES MOBILE + PC */

const leftBtn=document.getElementById("left")
const rightBtn=document.getElementById("right")
const jumpBtn=document.getElementById("jump")

function pressLeft(){ keys["ArrowLeft"]=true }
function releaseLeft(){ keys["ArrowLeft"]=false }

function pressRight(){ keys["ArrowRight"]=true }
function releaseRight(){ keys["ArrowRight"]=false }

leftBtn.addEventListener("mousedown",pressLeft)
leftBtn.addEventListener("mouseup",releaseLeft)
rightBtn.addEventListener("mousedown",pressRight)
rightBtn.addEventListener("mouseup",releaseRight)

leftBtn.addEventListener("touchstart",pressLeft)
leftBtn.addEventListener("touchend",releaseLeft)
rightBtn.addEventListener("touchstart",pressRight)
rightBtn.addEventListener("touchend",releaseRight)

jumpBtn.addEventListener("touchstart",()=>{
if(!jumping){
velocityY=12
jumping=true
}
})

jumpBtn.addEventListener("click",()=>{
if(!jumping){
velocityY=12
jumping=true
}
})

function gameLoop(){

if(keys["ArrowRight"]) x+=4
if(keys["ArrowLeft"]) x-=4

velocityY-=gravity
y+=velocityY

if(y<40){
y=40
velocityY=0
jumping=false
}

player.style.left=x+"px"
player.style.bottom=y+"px"

world.style.left=-(x-200)+"px"

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
