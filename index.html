<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Nosso Amor 💖</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
}

/* JOGO */

#game{
position:relative;
width:900px;
height:420px;
margin:40px auto;
background:linear-gradient(#ff9a9e,#fad0c4);
overflow:hidden;
border-radius:10px;
}

.world{
position:absolute;
width:12000px;
height:100%;
}

.player{
position:absolute;
width:40px;
height:40px;
background:#ff4d6d;
border-radius:50%;
bottom:40px;
}

.platform{
position:absolute;
width:150px;
height:15px;
background:#a66b3d;
}

.ground{
position:absolute;
bottom:0;
width:12000px;
height:40px;
background:#8b5e3c;
}

.heart{
position:absolute;
font-size:24px;
}

.spike{
position:absolute;
width:40px;
height:40px;
bottom:40px;
background:red;
clip-path:polygon(50% 0%,0% 100%,100% 100%);
}

.enemy{
position:absolute;
width:35px;
height:35px;
background:#222;
border-radius:50%;
bottom:40px;
}

.controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
}

.controls button{
width:70px;
height:70px;
font-size:30px;
border:none;
border-radius:15px;
background:#ff4d6d;
color:white;
}

</style>
</head>

<body>

<h2>💖 Para o meu amor 💖</h2>
<div id="score">Corações: 0</div>

<div id="game">

<div class="world" id="world">

<div class="ground"></div>
<div class="player" id="player"></div>

<div class="platform" style="left:400px;bottom:120px"></div>
<div class="platform" style="left:900px;bottom:200px"></div>

<div class="spike" style="left:700px"></div>

<div class="enemy" style="left:1200px"></div>

<div id="hearts"></div>

</div>

</div>

<div class="controls">
<button id="left">⬅</button>
<button id="jump">⬆</button>
<button id="right">➡</button>
</div>

<script>

const player=document.getElementById("player")
const world=document.getElementById("world")
const platforms=document.querySelectorAll(".platform")
const spikes=document.querySelectorAll(".spike")
const enemies=document.querySelectorAll(".enemy")
const heartsContainer=document.getElementById("hearts")
const scoreText=document.getElementById("score")

let x=50
let y=40
let velocityY=0
let gravity=0.5
let jumping=false
let score=0

const keys={}

/* gerar corações */

for(let i=0;i<30;i++){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*4000+"px"
heart.style.bottom=(60+Math.random()*300)+"px"

heartsContainer.appendChild(heart)

}

/* teclado */

document.addEventListener("keydown",e=>{
keys[e.key]=true

if(e.key===" " && !jumping){
velocityY=12
jumping=true
}

})

document.addEventListener("keyup",e=>{
keys[e.key]=false
})

/* botões */

const leftBtn=document.getElementById("left")
const rightBtn=document.getElementById("right")
const jumpBtn=document.getElementById("jump")

function pressLeft(){keys["ArrowLeft"]=true}
function releaseLeft(){keys["ArrowLeft"]=false}

function pressRight(){keys["ArrowRight"]=true}
function releaseRight(){keys["ArrowRight"]=false}

leftBtn.addEventListener("mousedown",pressLeft)
leftBtn.addEventListener("mouseup",releaseLeft)

rightBtn.addEventListener("mousedown",pressRight)
rightBtn.addEventListener("mouseup",releaseRight)

leftBtn.addEventListener("touchstart",pressLeft)
leftBtn.addEventListener("touchend",releaseLeft)

rightBtn.addEventListener("touchstart",pressRight)
rightBtn.addEventListener("touchend",releaseRight)

jumpBtn.addEventListener("click",jump)
jumpBtn.addEventListener("touchstart",jump)

function jump(){
if(!jumping){
velocityY=12
jumping=true
}
}

function die(){
alert("Você morreu!")
location.reload()
}

function gameLoop(){

if(keys["ArrowRight"]) x+=4
if(keys["ArrowLeft"]) x-=4

velocityY-=gravity
y+=velocityY

if(y<40){
y=40
velocityY=0
jumping=false
}

/* plataformas */

platforms.forEach(p=>{

let left=p.offsetLeft
let right=left+p.offsetWidth
let top=p.offsetTop
let playerBottom=420-y

if(
x+40>left &&
x<right &&
playerBottom>=top &&
playerBottom<=top+20 &&
velocityY<=0
){
y=420-top
velocityY=0
jumping=false
}

})

player.style.left=x+"px"
player.style.bottom=y+"px"

world.style.left=-(x-200)+"px"

/* corações */

document.querySelectorAll(".heart").forEach(heart=>{

if(heart.style.display==="none") return

let hx=heart.offsetLeft
let hy=heart.offsetTop

if(Math.abs(x-hx)<40 && Math.abs((420-y)-hy)<40){

heart.style.display="none"
score++
scoreText.innerText="Corações: "+score

}

})

/* espinhos */

spikes.forEach(s=>{
if(Math.abs(x-s.offsetLeft)<30 && y<=45){
die()
}
})

/* inimigos */

enemies.forEach(e=>{

let ex=e.offsetLeft

if(y>60 && Math.abs(x-ex)<35){

e.style.display="none"
velocityY=10

}else if(Math.abs(x-ex)<35 && y<=60){

die()

}

})

requestAnimationFrame(gameLoop)

}

gameLoop()

</script>

</body>
</html>
